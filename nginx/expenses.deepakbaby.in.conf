server {
    listen 80;
    server_name expenses.deepakbaby.in;

    access_log /var/log/nginx/expenses.access.log;
    error_log  /var/log/nginx/expenses.error.log;

    # Allow phone-photo / PDF invoice uploads (keep in sync with MAX_UPLOAD_MB).
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# After DNS resolves, run:  sudo certbot --nginx -d expenses.deepakbaby.in
# Certbot rewrites this file to add the listen 443 / TLS block automatically.
